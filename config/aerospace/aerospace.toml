# AeroSpace config — tiling window manager
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# Reload after edits:  aerospace reload-config

# Start AeroSpace at login
start-at-login = true

# Normalizations keep the tree tidy
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Reload borders when AeroSpace starts (so the glow is always on)
after-startup-command = ['exec-and-forget borders']

# Notify SketchyBar when the focused workspace changes (highlights the active space)
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Tiling gaps (the breathing room that makes a rice look clean)
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8     # macOS reserves 32px at top (covers the bar); just an 8px gap
outer.right      = 8

# Default layout for new windows: tiled, accordion as fallback
[mode.main.binding]
# --- Layout ---
alt-slash = 'layout tiles horizontal vertical'   # toggle split orientation
alt-comma = 'layout accordion horizontal vertical'

# --- Focus (move attention between windows) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move windows around ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Workspaces (virtual desktops) ---
# 1 code · 2 web · 3 notes · 4 chat · 5 media · 9 showpiece
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-9 = 'workspace 9'

# Send focused window to a workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-9 = 'move-node-to-workspace 9'

# Launch the showpiece (classic unixporn layout) on workspace 9
alt-shift-s = ['workspace 9', 'exec-and-forget $HOME/dev/macos-rice/bin/showpiece']

# Jump back to previous workspace
alt-tab = 'workspace-back-and-forth'

# Toggle floating / tiling for the focused window
alt-shift-space = 'layout floating tiling'

# Fullscreen
alt-f = 'fullscreen'

# Enter "service" mode for less-common actions
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']   # reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# --- App auto-assignment -----------------------------------------------------
# Apps are matched by bundle id (app-id) and sent to a fixed workspace on open.
# Find any app's id with:  osascript -e 'id of app "AppName"'

# 1 · code
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 1'

# 2 · web
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

# 3 · notes
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 3'

# 4 · chat
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 4'

# 5 · media
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 5'

# Float apps that misbehave when tiled
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'
