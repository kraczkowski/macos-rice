# Starship prompt — Sunset Ember palette
# Shared palette mirrors config/sketchybar/colors.sh
# Docs: https://starship.rs/config/

format = """
[](ember)\
$os\
$directory\
[](fg:ember)\
$git_branch\
$git_status\
$nodejs\
$python\
$rust """

palette = "sunset_ember"

[palettes.sunset_ember]
base    = "#0a1618"   # dark teal base
text    = "#e8d5c2"   # warm white
ember   = "#b33219"   # ember accent  — prompt pill (os + directory)
oxide   = "#a5311a"   # oxidized iron — git
sand    = "#c9a892"   # warm sand     — languages
surface = "#162930"   # dark teal surface
red     = "#b33219"   # error

[os]
disabled = false
style = "bg:surface fg:ember"
format = "[ $symbol]($style)"

[os.symbols]
Macos = "󰀵 "

[directory]
style = "bg:surface fg:text"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:oxide"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:oxide"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = ""
style = "fg:sand"
format = '[ $symbol ]($style)'

[python]
symbol = ""
style = "fg:sand"
format = '[ $symbol ]($style)'

[rust]
symbol = ""
style = "fg:sand"
format = '[ $symbol ]($style)'
