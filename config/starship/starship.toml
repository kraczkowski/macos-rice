# Starship prompt — Sunset Ember palette
# Docs: https://starship.rs/config/

format = """
[](blue)\
$os\
$username\
[](bg:purple fg:blue)\
$directory\
[](bg:cyan fg:purple)\
$git_branch\
$git_status\
[](bg:green fg:cyan)\
$nodejs\
$python\
$rust\
[](fg:green)\
$line_break\
$character"""

palette = "sunset_ember"

[palettes.sunset_ember]
base   = "#0a1618"
text   = "#e8d5c2"
blue   = "#b33219"   # ember      — os / user segment
purple = "#a5311a"   # oxidized   — directory segment
cyan   = "#c2542f"   # burnt      — git segment
green  = "#d9853f"   # amber      — language segment
red    = "#b33219"   # ember      — root / error

[os]
disabled = false
style = "bg:blue fg:base"

[os.symbols]
Macos = "󰀵 "

[username]
show_always = true
style_user = "bg:blue fg:base"
style_root = "bg:red fg:base"
format = '[ $user ]($style)'

[directory]
style = "bg:purple fg:base"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:cyan fg:base"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:cyan fg:base"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
