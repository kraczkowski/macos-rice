#? Config file for btop v. 1.4.7 — Sunset Ember rice

# Color theme from themes/ (without .theme). "Default" uses btop builtin.
color_theme = "sunset_ember"

# If false, btop paints the theme's main_bg. If true, it keeps the terminal
# background — needed for Ghostty's transparency/blur to show through.
theme_background = True

# Use 24-bit truecolor.
truecolor = True

# Force tty mode (16 color + tty graphs). Off = full color.
force_tty = False

# Visible boxes: "cpu mem net proc".
shown_boxes = "cpu mem net proc"

# Update interval in ms (>= 100). 1s feels live without being noisy.
update_ms = 1000

# Processes: sort by cpu, "lazy" = smoother, less jumpy ordering.
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True

# CPU graph: top half = total load, bottom half = per-core breakdown.
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_single_graph = False
cpu_bottom = False
show_uptime = True
check_temp = True
show_coretemp = True
temp_scale = "celsius"

# Rounded box corners + braille graph cells (smoothest look).
rounded_corners = True
graph_symbol = "braille"

# Mem box: show disks, hide io graphs by default.
mem_graphs = True
show_disks = True
show_io_stat = True
io_mode = False

# Net: auto-scale, show interface sync.
net_auto = True
net_sync = True

# Battery meter (laptop).
show_battery = True

# 24h clock in the top bar.
clock_format = "%H:%M"

# Keep vim_keys off — arrows + shortcuts are fine for now.
vim_keys = False

# Background update while in menus.
background_update = True
